plugins {
    id "com.android.application"
    id "kotlin-android"
    // O Flutter Gradle Plugin deve ser aplicado após os plugins Android e Kotlin.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.pontal_delivery"
    compileSdkVersion 35 // Usando a versão do SDK Android 35 (Android 12)

    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // Defina seu Application ID único
        applicationId = "com.example.pontal_delivery"
        minSdkVersion flutter.minSdkVersion // Versão mínima do SDK definida no flutter
        targetSdkVersion flutter.targetSdkVersion // Versão de destino do SDK definida no flutter
        versionCode flutter.versionCode // Código da versão do Flutter
        versionName flutter.versionName // Nome da versão do Flutter
    }

    buildTypes {
        release {
            // Configuração de assinatura para build de release
            signingConfig = signingConfigs.debug // Use uma configuração de assinatura adequada
        }
    }
}

// Especificação do Flutter
flutter {
    source = "../.." // Local do código Flutter
}

